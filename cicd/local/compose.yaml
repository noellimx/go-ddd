services:
  db:
    restart: always
    image: postgres:18.3-alpine3.22
    volumes:
      - pg_data:/var/lib/postgresql/18
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    ports:
      - ${POSTGRES_PORT}:5432
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 5s
  migrate:
    image: migrate/migrate
    volumes:
      - ${MIGRATION_PATH}:/migrations
    depends_on:
      db:
        condition: service_healthy
  api:
    build:
      context: ${APP_ROOT}
      dockerfile: ${APP_DOCKERFILE}
      args:
        MAIN_PATH: ${APP_MAIN_PATH}
    volumes:
      - ${INFRA_DOCKER_SOCK}:/var/run/docker.sock
    environment:
    - POSTGRES_USER=${POSTGRES_USER}
    - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    - POSTGRES_DB=${POSTGRES_DB}
  mockery:
    image: vektra/mockery:3
    working_dir: /src
    volumes:
      - ${APP_ROOT}:/src
volumes:
  pg_data:
    name: "pg_data"